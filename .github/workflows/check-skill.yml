name: check-skill

# Guard the skill against drifting from pangu.js: every `before → after`
# example in skills/pangu/SKILL.md must match the pinned pangu's output.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
